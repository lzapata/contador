<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@0.12.2/dist/ml5.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; margin: 0; }
        .stats { background: #333; padding: 15px; }
        #counter { font-size: 3rem; color: #27ae60; font-weight: bold; }
        canvas { width: 100% !important; height: auto !important; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="stats">
        <div id="status">⏳ Cargando...</div>
        <div id="counter">0</div>
        <button onclick="saveCount()" style="padding:10px; background:orange; border:none; border-radius:5px;">GUARDAR</button>
    </div>
    <div id="canvas-container"></div>
    <ul id="log" style="text-align:left;"></ul>

    <script>
        let video;
        let detector;
        let detections = [];

        function setup() {
            const canvas = createCanvas(640, 480);
            canvas.parent('canvas-container');
            
            // Forzamos cámara trasera
            video = createCapture({
                video: { facingMode: "environment" }
            }, function() {
                console.log("Cámara activa");
                // Cargamos el modelo
                detector = ml5.objectDetector('cocossd', {}, modelReady);
            });
            video.size(640, 480);
            video.hide();
        }

        function modelReady() {
            document.getElementById('status').innerText = "✅ FUNCIONANDO";
            detectObjects();
        }

        function detectObjects() {
            detector.detect(video, (err, results) => {
                if (!err) {
                    detections = results;
                }
                detectObjects(); // Bucle infinito de detección
            });
        }

        function draw() {
            image(video, 0, 0, width, height);
            
            let count = 0;
            
            for (let i = 0; i < detections.length; i++) {
                let obj = detections[i];
                
                // IMPORTANTE: COCO-SSD reconoce cabras como 'sheep', 'cow' o 'dog'
                // Vamos a aceptar casi cualquier animal para probar
                if (obj.label === 'sheep' || obj.label === 'cow' || obj.label === 'dog' || obj.label === 'horse' || obj.label === 'person') {
                    count++;
                    
                    // Dibujar cuadro brillante
                    stroke(0, 255, 0);
                    strokeWeight(4);
                    noFill();
                    rect(obj.x, obj.y, obj.width, obj.height);
                    
                    // Dibujar nombre de lo que cree que ve
                    noStroke();
                    fill(0, 255, 0);
                    textSize(24);
                    text(obj.label, obj.x, obj.y - 10);
                }
            }
            
            document.getElementById('counter').innerText = count;
        }

        function saveCount() {
            const c = document.getElementById('counter').innerText;
            const li = document.createElement('li');
            li.innerText = new Date().toLocaleTimeString() + " - Conteo: " + c;
            document.getElementById('log').prepend(li);
        }
    </script>
</body>
</html>
