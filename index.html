<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Goat Counter - Live</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; background: #1a1a1a; color: white; }
        #canvas-container { display: flex; justify-content: center; margin-top: 10px; }
        canvas { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 95%; height: auto !important; }
        .ui-panel { padding: 20px; background: #2d2d2d; border-radius: 0 0 20px 20px; }
        .counter-badge { font-size: 2rem; background: #27ae60; padding: 10px 20px; border-radius: 50px; display: inline-block; margin: 10px 0; }
        button { background: #e67e22; color: white; border: none; padding: 15px 30px; font-size: 1rem; border-radius: 10px; cursor: pointer; font-weight: bold; }
        button:active { transform: scale(0.95); }
        #history { text-align: left; padding: 20px; max-width: 500px; margin: auto; }
        .log-item { border-bottom: 1px solid #444; padding: 10px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2>🐐 IA Contador de Corral</h2>
        <div id="status">Cargando Cerebro Artificial...</div>
        <div class="counter-badge" id="count-num">0</div>
        <br>
        <button onclick="saveToHistory()">📸 REGISTRAR CONTEO</button>
    </div>

    <div id="canvas-container"></div>

    <div id="history">
        <h3>📊 Historial del día</h3>
        <div id="log-list"></div>
    </div>

    <script>
        let video;
        let detector;
        let detections = [];
        let goatCount = 0;

        function setup() {
            // Crear canvas que se ajusta a la pantalla
            const canvas = createCanvas(640, 480);
            canvas.parent('canvas-container');

            // Configurar cámara trasera en celulares
            const constraints = {
                video: {
                    facingMode: "environment" // Fuerza la cámara de atrás
                }
            };
            video = createCapture(constraints);
            video.size(640, 480);
            video.hide();

            // Cargar modelo COCO-SSD
            detector = ml5.objectDetector('cocossd', modelReady);
        }

        function modelReady() {
            document.getElementById('status').innerText = "✅ Cámara e IA Listas";
            detect();
        }

        function detect() {
            // El modelo busca en el video continuamente
            detector.detect(video, (err, results) => {
                if (err) return;
                detections = results;
                detect(); // Recursión para detección constante
            });
        }

        function draw() {
            // Dibujar el feed de la cámara
            image(video, 0, 0, width, height);

            let tempCount = 0;

            for (let i = 0; i < detections.length; i++) {
                let obj = detections[i];
                
                // Filtramos por animales que se parecen a cabras (ovejas, vacas, perros)
                if (obj.label === 'goat') {
                    tempCount++;

                    // Dibujar cuadro
                    stroke(39, 174, 96);
                    strokeWeight(4);
                    noFill();
                    rect(obj.x, obj.y, obj.width, obj.height, 5);
                    
                    // Dibujar etiqueta
                    fill(39, 174, 96);
                    noStroke();
                    textSize(18);
                    text("Animal detectado", obj.x, obj.y - 10);
                }
            }
            goatCount = tempCount;
            document.getElementById('count-num').innerText = goatCount;
        }

        function saveToHistory() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString();
            const dateStr = now.toLocaleDateString();
            
            const logList = document.getElementById('log-list');
            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `<strong>${dateStr} ${timeStr}</strong> - Conteo: ${goatCount} animales`;
            
            logList.prepend(item);

            // Guardar localmente en el navegador (Base de datos interna)
            const registro = { fecha: dateStr, hora: timeStr, total: goatCount };
            let historialLocal = JSON.parse(localStorage.getItem('conteoCabras') || "[]");
            historialLocal.push(registro);
            localStorage.setItem('conteoCabras', JSON.stringify(historialLocal));

            alert("Conteo guardado en la base de datos local");
        }

        // Cargar datos previos al iniciar
        window.onload = () => {
            let historialLocal = JSON.parse(localStorage.getItem('conteoCabras') || "[]");
            const logList = document.getElementById('log-list');
            historialLocal.reverse().forEach(reg => {
                const item = document.createElement('div');
                item.className = 'log-item';
                item.innerHTML = `<strong>${reg.fecha} ${reg.hora}</strong> - Conteo: ${reg.total} animales`;
                logList.appendChild(item);
            });
        };
    </script>
</body>
</html>
