<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ml5@0.12.2/dist/ml5.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; margin: 0; }
        .stats { background: #333; padding: 15px; }
        #counter { font-size: 3rem; color: #27ae60; font-weight: bold; }
        canvas { width: 100% !important; height: auto !important; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="stats">
        <div id="status">⏳ Cargando...</div>
        <div id="counter">0</div>
        <button onclick="saveCount()" style="padding:10px; background:orange; border:none; border-radius:5px;">GUARDAR</button>
    </div>
    <div id="canvas-container"></div>
    <ul id="log" style="text-align:left;"></ul>

    <script>
        let video;
        let detector;
        let detections = [];
        let historialConteos = []; // Para estabilizar el número
        
        function setup() {
            const canvas = createCanvas(640, 480);
            canvas.parent('canvas-container');
            
            video = createCapture({
                video: { facingMode: "environment" }
            }, function() {
                // Ajustamos la confianza a 0.45 para evitar "fantasmas"
                detector = ml5.objectDetector('cocossd', { confidence: 0.45 }, modelReady);
            });
            video.size(640, 480);
            video.hide();
        }
        
        function modelReady() {
            document.getElementById('status').innerText = "✅ CONTANDO CABRAS...";
            detectObjects();
        }
        
        function detectObjects() {
            detector.detect(video, (err, results) => {
                if (!err) {
                    detections = results;
                }
                detectObjects();
            });
        }
        
        function draw() {
            image(video, 0, 0, width, height);
            
            let conteoInstantaneo = 0;
            
            for (let i = 0; i < detections.length; i++) {
                let obj = detections[i];
                
                // Filtro estricto: Solo etiquetas que la IA usa para cabras/ganado
                if (obj.label === 'sheep' || obj.label === 'cow') {
                    conteoInstantaneo++;
                    
                    // Dibujar visualización
                    stroke(40, 255, 100);
                    strokeWeight(3);
                    noFill();
                    rect(obj.x, obj.y, obj.width, obj.height, 8);
                    
                    fill(40, 255, 100);
                    noStroke();
                    textSize(20);
                    text("CABRA", obj.x, obj.y - 10);
                }
            }
            
            // --- LÓGICA DE ESTABILIZACIÓN ---
            historialConteos.push(conteoInstantaneo);
            if (historialConteos.length > 20) { // Guardamos los últimos 20 cuadros
                historialConteos.shift();
            }
            
            // Calculamos la MODA (el número que más se repite en el historial)
            // Esto evita que el contador salte si una cabra desaparece un milisegundo
            let conteoEstable = calcularModa(historialConteos);
            
            document.getElementById('counter').innerText = conteoEstable;
        }
        
        // Función auxiliar para estabilizar el número
        function calcularModa(arr) {
            if(arr.length == 0) return 0;
            let modo = {};
            let maxEl = arr[0], maxCount = 1;
            for(let i = 0; i < arr.length; i++) {
                let el = arr[i];
                if(modo[el] == null) modo[el] = 1;
                else modo[el]++;
                if(modo[el] > maxCount) {
                    maxEl = el;
                    maxCount = modo[el];
                }
            }
            return maxEl;
        }
        
        function saveCount() {
            const num = document.getElementById('counter').innerText;
            const tiempo = new Date().toLocaleString();
            const li = document.createElement('li');
            li.style.color = "#27ae60";
            li.innerHTML = `<strong>${num} Cabras</strong> - ${tiempo}`;
            document.getElementById('log').prepend(li);
        }
    </script>
</body>
</html>
